<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Processor</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fb; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 1200px; width: 100%; background: white; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); padding: 40px; }
        h1 { margin-top: 0; margin-bottom: 32px; font-weight: 600; font-size: 28px; color: #1e293b; }
        .upload-section { background: #f8fafc; border-radius: 24px; padding: 32px; margin-bottom: 48px; border: 1px solid #e2e8f0; }
        .form-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
        .file-input-wrapper { flex: 2; min-width: 280px; }
        .file-input-wrapper label { display: block; font-size: 14px; font-weight: 500; color: #334155; margin-bottom: 8px; }
        .file-input { width: 100%; padding: 12px 16px; background: white; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 16px; }
        .options { flex: 3; display: flex; flex-wrap: wrap; gap: 24px; align-items: center; }
        .checkbox-group { display: flex; gap: 24px; flex-wrap: wrap; }
        .checkbox-group label { display: flex; align-items: center; gap: 8px; color: #1e293b; font-weight: 500; cursor: pointer; }
        .resize-inputs { display: flex; gap: 12px; align-items: center; }
        .resize-inputs input { width: 90px; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; text-align: center; }
        .upload-btn { background: #3b82f6; color: white; border: none; border-radius: 40px; padding: 14px 32px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px -2px rgba(59,130,246,0.3); }
        .upload-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .error-message { color: #dc2626; font-size: 14px; margin-top: 16px; padding: 12px; background: #fee2e2; border-radius: 12px; display: none; }
        .gallery { margin-top: 32px; }
        .gallery-item { background: #f9f9f9; border-radius: 20px; padding: 20px; margin-bottom: 24px; border: 1px solid #e2e8f0; display: flex; align-items: flex-start; gap: 24px; position: relative; }
        .original, .processed { flex: 1; min-width: 200px; }
        .original h3, .processed h3 { font-size: 16px; font-weight: 600; color: #334155; margin: 0 0 12px 0; }
        .image-box { background: #f1f5f9; border-radius: 16px; overflow: hidden; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .status-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; font-size: 12px; padding: 4px 8px; border-radius: 40px; }
        .delete-btn { position: absolute; top: 16px; right: 16px; background: #fee2e2; border: none; color: #dc2626; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; line-height: 1; }
        .delete-btn:hover { background: #fecaca; }
        .empty { color: #64748b; text-align: center; padding: 48px; background: #f8fafc; border-radius: 24px; }
        .dimensions { font-size: 12px; color: #64748b; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Processor</h1>
        <div class="upload-section">
            <div class="form-row">
                <div class="file-input-wrapper">
                    <label for="fileInput">Выберите изображение (JPEG или PNG)</label>
                    <input type="file" id="fileInput" accept="image/jpeg,image/png" class="file-input">
                </div>
                <div class="options">
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="resizeCheck"> Ресайз</label>
                        <label><input type="checkbox" id="thumbnailCheck"> Миниатюра</label>
                        <label><input type="checkbox" id="watermarkCheck"> Водяной знак</label>
                    </div>
                    <div class="resize-inputs" id="resizeInputs" style="display: none;">
                        <input type="number" id="widthInput" placeholder="Ширина" min="1" value="800">
                        <span>x</span>
                        <input type="number" id="heightInput" placeholder="Высота" min="1" value="600">
                    </div>
                </div>
                <button id="uploadBtn" class="upload-btn">Загрузить</button>
            </div>
            <div id="uploadError" class="error-message"></div>
        </div>

        <h2>Загруженные изображения</h2>
        <div id="gallery" class="gallery"></div>
    </div>

    <script>
        const API_BASE = '';
        const POLL_INTERVAL = 3000;

        const fileInput = document.getElementById('fileInput');
        const resizeCheck = document.getElementById('resizeCheck');
        const thumbnailCheck = document.getElementById('thumbnailCheck');
        const watermarkCheck = document.getElementById('watermarkCheck');
        const resizeInputs = document.getElementById('resizeInputs');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadError = document.getElementById('uploadError');
        const gallery = document.getElementById('gallery');

        let images = []; // массив объектов { id, originalName, status, variants: [{ type, width, height, size }] }

        resizeCheck.addEventListener('change', () => {
            resizeInputs.style.display = resizeCheck.checked ? 'flex' : 'none';
        });

        function validateFile(file) {
            if (!file) throw new Error('Файл не выбран');
            if (!['image/jpeg', 'image/png'].includes(file.type)) throw new Error('Только JPEG и PNG');
            if (file.size > 10 * 1024 * 1024) throw new Error('Максимум 10 МБ');
        }

        function hasOperations() {
            return resizeCheck.checked || thumbnailCheck.checked || watermarkCheck.checked;
        }

        async function uploadImage() {
            const file = fileInput.files[0];
            try {
                validateFile(file);
                if (!hasOperations()) throw new Error('Выберите операцию');
            } catch (err) {
                showError(err.message);
                return;
            }

            const formData = new FormData();
            formData.append('image', file);
            if (resizeCheck.checked) {
                formData.append('resize', 'true');
                formData.append('width', widthInput.value);
                formData.append('height', heightInput.value);
            }
            if (thumbnailCheck.checked) formData.append('thumbnail', 'true');
            if (watermarkCheck.checked) formData.append('watermark', 'true');

            setUploadLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error(await response.text() || 'Ошибка загрузки');
                const result = await response.json();
                fileInput.value = '';
                await fetchImages();
            } catch (err) {
                showError(err.message);
            } finally {
                setUploadLoading(false);
            }
        }

        async function fetchImages() {
            try {
                const response = await fetch(`${API_BASE}/images?limit=20`);
                if (!response.ok) return;
                images = await response.json();
                renderGallery();
            } catch (err) {
                console.error('Ошибка получения списка:', err);
            }
        }

        async function deleteImage(id) {
            if (!confirm('Удалить изображение и все его варианты?')) return;
            try {
                const response = await fetch(`${API_BASE}/image/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error(await response.text() || 'Ошибка удаления');
                images = images.filter(img => img.id !== id);
                renderGallery();
            } catch (err) {
                alert(`Ошибка: ${err.message}`);
            }
        }

        function downloadImage(id, variant = 'original') {
            window.location.href = `${API_BASE}/image/${id}/file?variant=${variant}`;
        }

        function renderGallery() {
            if (!images.length) {
                gallery.innerHTML = '<div class="empty">Нет загруженных изображений</div>';
                return;
            }

            let html = '';
            images.forEach(img => {
                const original = { name: img.originalName, status: img.status, variants: img.variants || [] };
                const processedVariant = original.variants.find(v => v.type !== 'original');
                const processedUrl = processedVariant ? `${API_BASE}/image/${img.id}/file?variant=${processedVariant.type}` : null;

                html += `
                    <div class="gallery-item" data-id="${img.id}">
                        <button class="delete-btn" onclick="deleteImage('${img.id}')" title="Удалить">✕</button>
                        <div class="original">
                            <h3>Оригинал</h3>
                            <div class="image-box" onclick="downloadImage('${img.id}', 'original')">
                                ${img.status === 'completed' ? `<img src="${API_BASE}/image/${img.id}/file?variant=original" alt="${img.originalName}">` : '<div>⏳</div>'}
                                <span class="status-badge">${getStatusText(img.status)}</span>
                            </div>
                            <div class="dimensions">${img.originalName}</div>
                        </div>
                        <div class="processed">
                            <h3>Обработанное</h3>
                            <div class="image-box" onclick="${processedVariant ? `downloadImage('${img.id}', '${processedVariant.type}')` : ''}">
                                ${img.status === 'completed' && processedVariant ? `<img src="${processedUrl}" alt="processed">` : '<div>—</div>'}
                            </div>
                            ${processedVariant ? `<div class="dimensions">${processedVariant.width}×${processedVariant.height}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            gallery.innerHTML = html;
        }

        function getStatusText(status) {
            return {
                'pending': 'В очереди',
                'processing': 'Обработка',
                'completed': 'Готово',
                'failed': 'Ошибка'
            }[status] || status;
        }

        function showError(msg) { uploadError.textContent = msg; uploadError.style.display = 'block'; }
        function hideError() { uploadError.style.display = 'none'; }
        function setUploadLoading(loading) {
            uploadBtn.disabled = loading;
            uploadBtn.textContent = loading ? 'Загрузка...' : 'Загрузить';
        }

        // Polling
        let pollTimer;
        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(fetchImages, POLL_INTERVAL);
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchImages();
            startPolling();
            uploadBtn.addEventListener('click', uploadImage);
        });

        window.addEventListener('beforeunload', () => clearInterval(pollTimer));
    </script>
</body>
</html>
